name: Release Plugins

on:
  push:
  delete:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: release-${{ github.ref }}

jobs:
  cleanup:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-marketplace-build

      - run: marketplace-build cleanup-branch ${{ github.event.ref }}

  prepare:
    if: github.event_name != 'delete' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      id-token: write
    outputs:
      plugins: ${{ steps.matrix.outputs.plugins }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-marketplace-build

      - uses: actions/upload-artifact@v4
        with:
          name: marketplace-build-cli
          path: tools/marketplace-build/build/marketplace-build

      - id: matrix
        run: marketplace-build prepare-matrix >> $GITHUB_OUTPUT

  build:
    needs: prepare
    if: needs.prepare.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.prepare.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-marketplace-build
        with:
          artifact-name: marketplace-build-cli

      - name: Build Go plugin
        if: ${{ hashFiles(format('plugins/{0}/**/*.go', matrix.plugin)) != '' }}
        uses: wow-look-at-my/go-toolchain@latest
        with:
          working-directory: plugins/${{ matrix.plugin }}
          os: linux,darwin
          arch: amd64,arm64
          upload-artifacts: 'false'

      - name: Build
        run: marketplace-build build-plugin ${{ matrix.plugin }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Test
        run: marketplace-build test-plugin ${{ matrix.plugin }}

      - name: Prepare Release
        id: release
        run: marketplace-build release-plugin ${{ matrix.plugin }} >> $GITHUB_OUTPUT

      - uses: ./.github/actions/setup-claude-code

      - name: Validate Plugin
        run: claude plugin validate ${{ steps.release.outputs.source_dir }}

      - uses: wow-look-at-my-code/actions@orphan-release#latest
        with:
          source: ${{ steps.release.outputs.source_dir }}
          name: plugin/${{ matrix.plugin }}
          message: ${{ steps.release.outputs.message }}

  pages:
    needs: [prepare, build]
    if: '!cancelled() && !failure()'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-marketplace-build
        with:
          artifact-name: marketplace-build-cli

      - name: Build npm registry
        id: registry
        run: marketplace-build build-npm-registry >> $GITHUB_OUTPUT

      - name: Add marketplace.json to registry
        run: |
          marketplace-build update-marketplace > /tmp/marketplace-out.txt
          src=$(grep '^source_dir=' /tmp/marketplace-out.txt | cut -d= -f2)
          cp "$src/marketplace.json" "${{ steps.registry.outputs.registry_dir }}/marketplace.json"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.registry.outputs.registry_dir }}

      - name: Deploy Pages
        id: deployment
        if: github.ref == 'refs/heads/master'
        uses: actions/deploy-pages@v4

  pr-pages:
    needs: prepare
    if: github.event.action != '' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-marketplace-build
        with:
          artifact-name: marketplace-build-cli

      - name: Build npm registry
        id: registry
        run: marketplace-build build-npm-registry >> $GITHUB_OUTPUT

      - name: Add marketplace.json to registry
        run: |
          marketplace-build update-marketplace > /tmp/marketplace-out.txt
          src=$(grep '^source_dir=' /tmp/marketplace-out.txt | cut -d= -f2)
          cp "$src/marketplace.json" "${{ steps.registry.outputs.registry_dir }}/marketplace.json"

      - uses: actions/upload-artifact@v4
        with:
          name: npm-registry
          path: ${{ steps.registry.outputs.registry_dir }}

  deploy-preview:
    needs: pr-pages
    if: github.event.action != '' && always()
    permissions:
      contents: write
      pull-requests: write
      pages: write
      id-token: write
      statuses: write
    uses: PazerOP/pr-preview-action/.github/workflows/preview.yml@4f248afac2702fab9d8bbffff53335b120dbf463
    with:
      artifact-name: npm-registry
    secrets: inherit
