name: Release Plugins

on:
  push:
    branches: [master]
  delete:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: release-${{ github.ref }}

jobs:
  cleanup:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - run: npm ci
      - run: npx tsx .github/scripts/cleanup-branch.ts ${{ github.event.ref }}

  prepare:
    if: github.event_name != 'delete' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      id-token: write
    outputs:
      plugins: ${{ steps.matrix.outputs.plugins }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-marketplace-build

      - id: matrix
        run: marketplace-build prepare-matrix >> $GITHUB_OUTPUT

  build:
    needs: prepare
    if: needs.prepare.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.prepare.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-marketplace-build

      - name: Build Go plugin
        if: ${{ hashFiles(format('plugins/{0}/**/*.go', matrix.plugin)) != '' }}
        uses: wow-look-at-my/go-toolchain@latest
        with:
          working-directory: plugins/${{ matrix.plugin }}
          os: linux,darwin
          arch: amd64,arm64
          upload-artifacts: 'false'

      - name: Build
        run: npx tsx .github/scripts/build-plugin.ts ${{ matrix.plugin }}

      - name: Test
        run: npx tsx .github/scripts/test-plugin.ts ${{ matrix.plugin }}

      - name: Prepare Release
        id: release
        if: github.event_name == 'push'
        run: marketplace-build release-plugin ${{ matrix.plugin }} >> $GITHUB_OUTPUT

      - if: github.event_name == 'push'
        uses: ./.github/actions/setup-claude-code

      - name: Validate Plugin
        if: github.event_name == 'push'
        run: claude plugin validate ${{ steps.release.outputs.source_dir }}

      - if: github.event_name == 'push'
        uses: wow-look-at-my-code/actions@orphan-release#latest
        with:
          source: ${{ steps.release.outputs.source_dir }}
          name: plugin/${{ matrix.plugin }}
          message: ${{ steps.release.outputs.message }}

  pages:
    needs: [prepare, build]
    if: '!cancelled() && !failure()'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-marketplace-build

      - name: Build npm registry
        id: registry
        run: marketplace-build build-npm-registry >> $GITHUB_OUTPUT

      - name: Add marketplace.json to registry
        run: |
          marketplace-build update-marketplace > /tmp/marketplace-out.txt
          src=$(grep '^source_dir=' /tmp/marketplace-out.txt | cut -d= -f2)
          cp "$src/marketplace.json" "${{ steps.registry.outputs.registry_dir }}/marketplace.json"

      - uses: actions/upload-artifact@v4
        with:
          name: npm-registry
          path: ${{ steps.registry.outputs.registry_dir }}

  deploy-preview:
    needs: pages
    if: github.event_name != 'delete' && always()
    permissions:
      contents: write
      pull-requests: write
      pages: write
      id-token: write
      statuses: write
    uses: PazerOP/pr-preview-action/.github/workflows/preview.yml@4f248afac2702fab9d8bbffff53335b120dbf463
    with:
      artifact-name: npm-registry
    secrets: inherit
