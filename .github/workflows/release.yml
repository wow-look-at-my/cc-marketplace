name: Release Plugins

on:
  push:
  delete:

concurrency:
  group: release-${{ github.ref }}

jobs:
  cleanup:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - run: git fetch --tags

      - uses: ./.github/actions/setup-marketplace-build

      - run: marketplace-build cleanup-branch ${{ github.event.ref }}

  prepare:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      plugins: ${{ steps.matrix.outputs.plugins }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch --tags

      - uses: ./.github/actions/setup-marketplace-build

      - id: matrix
        run: marketplace-build prepare-matrix >> $GITHUB_OUTPUT

  build:
    needs: prepare
    if: needs.prepare.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.prepare.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v4

      - run: git fetch --tags

      - uses: ./.github/actions/setup-marketplace-build

      - uses: extractions/setup-just@v2

      - uses: wow-look-at-my-code/actions@smart-cache
        with:
          path: ~/go/pkg/mod ~/.cache/go-build
          key: go-${{ hashFiles('plugins/**/go.mod', 'plugins/**/go.sum') }}

      - name: Build
        run: marketplace-build build-plugin ${{ matrix.plugin }}

      - name: Test
        run: marketplace-build test-plugin ${{ matrix.plugin }}

      - name: Prepare Release
        id: release
        run: marketplace-build release-plugin ${{ matrix.plugin }} >> $GITHUB_OUTPUT

      - uses: wow-look-at-my-code/actions@orphan-tag
        with:
          source: ${{ steps.release.outputs.source_dir }}
          tags: ${{ steps.release.outputs.tag }}
          message: ${{ steps.release.outputs.message }}

  update:
    needs: [prepare, build]
    if: ${{ !cancelled() && !failure() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch --tags

      - uses: ./.github/actions/setup-marketplace-build

      - name: Prepare Marketplace Update
        id: marketplace
        run: marketplace-build update-marketplace >> $GITHUB_OUTPUT

      - uses: wow-look-at-my-code/actions@orphan-tag
        with:
          source: ${{ steps.marketplace.outputs.source_dir }}
          tags: ${{ steps.marketplace.outputs.tag }} ${{ steps.marketplace.outputs.latest_tag }}
          message: ${{ steps.marketplace.outputs.message }}
