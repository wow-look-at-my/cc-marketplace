name: Release Plugins

on:
  push:
    branches: [master]
  delete:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: release-${{ github.ref }}

jobs:
  cleanup:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - run: npm ci
      - run: npx tsx .github/scripts/cleanup-branch.ts ${{ github.event.ref }}

  prepare:
    if: github.event_name != 'delete' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      contents: write
      id-token: write
    outputs:
      build_plugins: ${{ steps.split.outputs.build_plugins }}
      cached_plugins: ${{ steps.split.outputs.cached_plugins }}
      has_build: ${{ steps.split.outputs.has_build }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-marketplace-build

      - id: matrix
        run: marketplace-build prepare-matrix >> $GITHUB_OUTPUT

      - name: Check plugin caches
        id: split
        if: steps.matrix.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CACHE_REF: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || format('refs/heads/{0}', github.ref_name) }}
        run: npx tsx .github/scripts/check-plugin-caches.ts '${{ steps.matrix.outputs.plugins }}' >> $GITHUB_OUTPUT

  build:
    needs: prepare
    if: needs.prepare.outputs.has_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.prepare.outputs.build_plugins) }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute plugin hash
        id: hash
        run: echo "value=${{ hashFiles(format('plugins/{0}/**', matrix.plugin)) }}" >> $GITHUB_OUTPUT

      - uses: ./.github/actions/setup-marketplace-build

      - name: Build Go plugin
        if: ${{ hashFiles(format('plugins/{0}/**/*.go', matrix.plugin)) != '' }}
        uses: wow-look-at-my/go-toolchain@latest
        with:
          working-directory: plugins/${{ matrix.plugin }}
          os: linux,darwin
          arch: amd64,arm64
          upload-artifacts: 'false'

      - name: Build
        run: npx tsx .github/scripts/build-plugin.ts ${{ matrix.plugin }}

      - name: Test
        run: npx tsx .github/scripts/test-plugin.ts ${{ matrix.plugin }}

      - name: Cook plugin
        id: release
        run: marketplace-build release-plugin ${{ matrix.plugin }} >> $GITHUB_OUTPUT

      - uses: ./.github/actions/setup-claude-code

      - name: Validate Plugin
        run: claude plugin validate ${{ steps.release.outputs.source_dir }}

      - name: Package plugin
        run: marketplace-build package-plugin --input ${{ steps.release.outputs.source_dir }} --output /tmp/packaged-${{ matrix.plugin }}

      - name: Save plugin cache
        uses: actions/cache/save@v4
        with:
          path: /tmp/packaged-${{ matrix.plugin }}
          key: plugin-${{ matrix.plugin }}-${{ steps.hash.outputs.value }}

      - name: Upload packaged plugin
        uses: actions/upload-artifact@v4
        with:
          name: packaged-${{ matrix.plugin }}
          path: /tmp/packaged-${{ matrix.plugin }}
          compression-level: 0
          if-no-files-found: error
          retention-days: 1

  pages:
    needs: [prepare, build]
    if: '!cancelled() && !failure()'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-marketplace-build

      - name: Restore cached plugins
        if: needs.prepare.outputs.cached_plugins != '[]' && needs.prepare.outputs.cached_plugins != ''
        run: npx tsx .github/scripts/restore-plugin-caches.ts '${{ needs.prepare.outputs.cached_plugins }}'

      - name: Move restored plugins to packaged dir
        if: needs.prepare.outputs.cached_plugins != '[]' && needs.prepare.outputs.cached_plugins != ''
        run: |
          set -e
          mkdir -p packaged
          for plugin in $(echo '${{ needs.prepare.outputs.cached_plugins }}' | jq -r '.[]'); do
            mv "/tmp/packaged-${plugin}" "packaged/${plugin}"
          done

      - name: Download built plugins
        if: needs.prepare.outputs.has_build == 'true'
        uses: actions/download-artifact@v4
        with:
          path: packaged
          pattern: packaged-*

      - name: Strip packaged- artifact prefix
        if: needs.prepare.outputs.has_build == 'true'
        run: |
          set -e
          shopt -s nullglob
          for d in packaged/packaged-*; do
            mv "$d" "packaged/${d#packaged/packaged-}"
          done

      - name: Compute registry base URL
        id: base-url
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "url=https://wow-look-at-my.github.io/cc-marketplace/pr-preview/pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "url=https://wow-look-at-my.github.io/cc-marketplace" >> $GITHUB_OUTPUT
          fi

      - name: Build npm registry
        id: registry
        run: marketplace-build build-npm-registry --input packaged --base-url "${{ steps.base-url.outputs.url }}" >> $GITHUB_OUTPUT

      - name: Add marketplace.json to registry
        run: |
          marketplace-build update-marketplace --input packaged --base-url "${{ steps.base-url.outputs.url }}" > /tmp/marketplace-out.txt
          src=$(grep '^source_dir=' /tmp/marketplace-out.txt | cut -d= -f2)
          cp "$src/marketplace.json" "${{ steps.registry.outputs.registry_dir }}/marketplace.json"

      - uses: ./.github/actions/setup-claude-code

      - name: Validate marketplace
        run: |
          claude plugin validate "${{ steps.registry.outputs.registry_dir }}/marketplace.json"
          claude plugin marketplace add "${{ steps.registry.outputs.registry_dir }}/marketplace.json"

      - uses: actions/upload-artifact@v4
        with:
          name: npm-registry
          path: ${{ steps.registry.outputs.registry_dir }}
          compression-level: 0

  deploy-preview:
    needs: pages
    if: github.event_name != 'delete'
    permissions:
      contents: write
      pull-requests: write
      pages: write
      id-token: write
      statuses: write
    uses: PazerOP/pr-preview-action/.github/workflows/preview.yml@master
    with:
      artifact-name: npm-registry
    secrets: inherit
