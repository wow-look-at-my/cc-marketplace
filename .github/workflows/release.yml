name: Release Plugins

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: release-${{ github.ref }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      id-token: write
    outputs:
      all_plugins: ${{ steps.matrix.outputs.plugins }}
      build_plugins: ${{ steps.split.outputs.build_plugins }}
      cached_plugins: ${{ steps.split.outputs.cached_plugins }}
      has_build: ${{ steps.split.outputs.has_build }}
      prod_version: ${{ steps.prod-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-marketplace-build

      - id: matrix
        run: marketplace-build prepare-matrix >> $GITHUB_OUTPUT

      - name: Check plugin caches
        id: split
        if: steps.matrix.outputs.has_changes == 'true'
        uses: wow-look-at-my/actions@typescript#latest
        env:
          GH_TOKEN: ${{ github.token }}
          NODE_PATH: ${{ github.workspace }}/node_modules
          CACHE_REF: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || format('refs/heads/{0}', github.ref_name) }}
        with:
          steps: ${{ toJSON(steps) }}
          script: |
            const { hashFiles } = require('@actions/glob');
            const plugins: string[] = JSON.parse(steps.matrix.outputs.plugins);
            const repo = process.env.GITHUB_REPOSITORY;
            const ref = process.env.CACHE_REF;

            const buildPlugins: string[] = [];
            const cachedPlugins: string[] = [];
            const toolHash = await hashFiles('tools/marketplace-build/**/*.go', 'tools/marketplace-build/go.mod');

            for (const plugin of plugins) {
              const hash = await hashFiles(`plugins/${plugin}/**`);
              const key = `plugin-${plugin}-${hash}-${toolHash}`;

              let cached = false;
              try {
                const out = child_process.execSync(
                  `gh api "repos/${repo}/actions/caches?key=${encodeURIComponent(key)}&ref=${encodeURIComponent(ref!)}" --jq ".actions_caches | length"`,
                  { encoding: 'utf8' },
                ).trim();
                cached = parseInt(out, 10) > 0;
              } catch {
                cached = false;
              }

              if (cached) {
                cachedPlugins.push(plugin);
                core.info(`${plugin}: cached`);
              } else {
                buildPlugins.push(plugin);
                core.info(`${plugin}: needs build`);
              }
            }

            core.setOutput('build_plugins', JSON.stringify(buildPlugins));
            core.setOutput('cached_plugins', JSON.stringify(cachedPlugins));
            core.setOutput('has_build', String(buildPlugins.length > 0));

      - name: Fetch production version for PR preview
        if: github.event_name == 'pull_request'
        id: prod-version
        run: |
          PROD_VERSION=$(curl -sf \
            "https://npm.pazer.build/@buildhost/cc-marketplace/html-demo" \
            | jq -r '.["dist-tags"].latest // empty' 2>/dev/null || echo "")
          if [ -n "$PROD_VERSION" ]; then
            echo "version=$PROD_VERSION" >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    if: needs.prepare.outputs.has_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.prepare.outputs.build_plugins) }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute plugin hash
        id: hash
        run: echo "value=${{ hashFiles(format('plugins/{0}/**', matrix.plugin), 'tools/marketplace-build/**/*.go', 'tools/marketplace-build/go.mod') }}" >> $GITHUB_OUTPUT

      - uses: ./.github/actions/setup-marketplace-build

      - name: Build Go plugin
        if: ${{ hashFiles(format('plugins/{0}/**/*.go', matrix.plugin)) != '' }}
        uses: wow-look-at-my/go-toolchain@latest
        with:
          working-directory: plugins/${{ matrix.plugin }}
          os: linux,darwin
          arch: amd64,arm64
          upload-artifacts: 'false'

      - name: Build
        run: npx tsx .github/scripts/build-plugin.ts ${{ matrix.plugin }}

      - name: Test
        run: npx tsx .github/scripts/test-plugin.ts ${{ matrix.plugin }}

      - name: Cook plugin
        id: release
        run: marketplace-build release-plugin ${{ matrix.plugin }} >> $GITHUB_OUTPUT

      - name: Align plugin version to production
        if: needs.prepare.outputs.prod_version != ''
        run: |
          jq --arg v "${{ needs.prepare.outputs.prod_version }}" '.version = $v' \
            "${{ steps.release.outputs.source_dir }}/package.json" > /tmp/pkg-aligned.json && \
          mv /tmp/pkg-aligned.json "${{ steps.release.outputs.source_dir }}/package.json"

      - uses: ./.github/actions/setup-claude-code

      - name: Validate Plugin
        run: claude plugin validate ${{ steps.release.outputs.source_dir }}

      - name: Package plugin
        run: marketplace-build package-plugin --input ${{ steps.release.outputs.source_dir }} --output /tmp/packaged-${{ matrix.plugin }}

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: packaged-${{ matrix.plugin }}
          path: /tmp/packaged-${{ matrix.plugin }}
          retention-days: 1

      - name: Save plugin cache
        uses: actions/cache/save@v4
        with:
          path: /tmp/packaged-${{ matrix.plugin }}
          key: plugin-${{ matrix.plugin }}-${{ steps.hash.outputs.value }}

      - name: Publish npm package to buildhost
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          TOKEN=$(curl -sS "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://pazer.build" \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" | jq -r .value)
          MANIFEST=$(cat /tmp/packaged-${{ matrix.plugin }}/manifest.json)
          PKG_NAME=$(echo "$MANIFEST" | jq -r '.name')
          PKG_VERSION=$(echo "$MANIFEST" | jq -r '.version')
          TARBALL_REL=$(echo "$MANIFEST" | jq -r '.main.tarball')
          TARBALL="/tmp/packaged-${{ matrix.plugin }}/$TARBALL_REL"
          PROJECT="cc-marketplace/${{ matrix.plugin }}"
          SERVER="https://pazer.build"

          # Create project (409 = already exists, both are fine)
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST "$SERVER/api/v1/projects" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"$PROJECT\"}")
          [ "$STATUS" = "201" ] || [ "$STATUS" = "409" ] || { echo "Create project failed ($STATUS)"; exit 1; }

          # Create release (409 = already exists, idempotent)
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST "$SERVER/api/v1/projects/$PROJECT/releases" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"version\":\"$PKG_VERSION\",\"git_branch\":\"$GITHUB_REF_NAME\",\"git_commit\":\"$GITHUB_SHA\"}")
          [ "$STATUS" = "201" ] || [ "$STATUS" = "409" ] || { echo "Create release failed ($STATUS)"; exit 1; }

          # Upload npm tarball (upsert: 409 on re-upload is fine)
          STATUS=$(curl -sS -o /tmp/upload-resp.txt -w "%{http_code}" \
            -X PUT "$SERVER/api/v1/projects/$PROJECT/releases/$PKG_VERSION/artifacts/any/any?kind=npm-package" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/gzip" \
            -H "X-Git-Commit: $GITHUB_SHA" \
            --data-binary @"$TARBALL")
          [ "$STATUS" = "201" ] || [ "$STATUS" = "200" ] || [ "$STATUS" = "409" ] || { echo "Upload failed ($STATUS): $(cat /tmp/upload-resp.txt)"; exit 1; }

          # Publish release
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST "$SERVER/api/v1/projects/$PROJECT/releases/$PKG_VERSION/publish" \
            -H "Authorization: Bearer $TOKEN")
          [ "$STATUS" = "200" ] || [ "$STATUS" = "204" ] || [ "$STATUS" = "409" ] || { echo "Publish failed ($STATUS)"; exit 1; }

          echo "Published $PKG_NAME@$PKG_VERSION to $SERVER/npm.pazer.build"

  publish-marketplace:
    needs: [prepare, build]
    if: >-
      github.event_name == 'push' &&
      github.ref_name == 'master' &&
      needs.prepare.outputs.all_plugins != '[]' &&
      needs.prepare.outputs.all_plugins != '' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-marketplace-build

      - name: Download all plugin artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: packaged-*
          path: /tmp/all-plugin-artifacts

      - name: Prepare combined input
        run: |
          mkdir -p /tmp/combined-plugins
          for d in /tmp/all-plugin-artifacts/packaged-*/; do
            plugin=$(basename "$d" | sed 's/^packaged-//')
            cp -r "$d" "/tmp/combined-plugins/$plugin"
          done

      - name: Update marketplace.json
        id: marketplace
        run: |
          marketplace-build update-marketplace \
            --input /tmp/combined-plugins \
            --base-url "https://npm.pazer.build" >> $GITHUB_OUTPUT

      - name: Assemble site
        run: |
          mkdir -p /tmp/site
          cp "${{ steps.marketplace.outputs.source_dir }}/marketplace.json" /tmp/site/
          cp site/index.html /tmp/site/

      - name: Publish to buildhost
        run: |
          TOKEN=$(curl -sS "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://pazer.build" \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" | jq -r .value)
          cd /tmp/site
          zip -r /tmp/marketplace-site.zip .
          for attempt in 1 2 3 4; do
            STATUS=$(curl -sS -o /tmp/upload-resp.txt -w "%{http_code}" \
              -X PUT "https://pazer.build/sites/cc-marketplace/branch/master" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/zip" \
              -H "X-Git-Commit: $GITHUB_SHA" \
              --data-binary @/tmp/marketplace-site.zip)
            [ "$STATUS" -lt 500 ] && break
            echo "Attempt $attempt failed ($STATUS), retrying..."
            sleep $((2 ** attempt))
          done
          if [ "$STATUS" != "201" ]; then
            echo "Upload failed ($STATUS): $(cat /tmp/upload-resp.txt)" && exit 1
          fi
          echo "Published marketplace to https://pazer.build/sites/cc-marketplace/branch/master/marketplace.json"
