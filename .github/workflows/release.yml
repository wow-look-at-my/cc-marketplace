name: Release Plugins

on:
  push:
    branches: [master]
  delete:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: release-${{ github.ref }}

jobs:
  cleanup:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - run: npm ci
      - run: npx tsx .github/scripts/cleanup-branch.ts ${{ github.event.ref }}

  prepare:
    if: github.event_name != 'delete'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      contents: write
      id-token: write
    outputs:
      build_plugins: ${{ steps.split.outputs.build_plugins }}
      cached_plugins: ${{ steps.split.outputs.cached_plugins }}
      has_build: ${{ steps.split.outputs.has_build }}
      prod_version: ${{ steps.prod-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-marketplace-build

      - id: matrix
        run: marketplace-build prepare-matrix >> $GITHUB_OUTPUT

      - name: Check plugin caches
        id: split
        if: steps.matrix.outputs.has_changes == 'true'
        uses: wow-look-at-my/actions@typescript#latest
        env:
          GH_TOKEN: ${{ github.token }}
          NODE_PATH: ${{ github.workspace }}/node_modules
          CACHE_REF: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || format('refs/heads/{0}', github.ref_name) }}
        with:
          steps: ${{ toJSON(steps) }}
          script: |
            const { hashFiles } = require('@actions/glob');
            const plugins: string[] = JSON.parse(steps.matrix.outputs.plugins);
            const repo = process.env.GITHUB_REPOSITORY;
            const ref = process.env.CACHE_REF;

            const buildPlugins: string[] = [];
            const cachedPlugins: string[] = [];
            const toolHash = await hashFiles('tools/marketplace-build/**/*.go', 'tools/marketplace-build/go.mod');

            for (const plugin of plugins) {
              const hash = await hashFiles(`plugins/${plugin}/**`);
              const key = `plugin-${plugin}-${hash}-${toolHash}`;

              let cached = false;
              try {
                const out = child_process.execSync(
                  `gh api "repos/${repo}/actions/caches?key=${encodeURIComponent(key)}&ref=${encodeURIComponent(ref!)}" --jq ".actions_caches | length"`,
                  { encoding: 'utf8' },
                ).trim();
                cached = parseInt(out, 10) > 0;
              } catch {
                cached = false;
              }

              if (cached) {
                cachedPlugins.push(plugin);
                core.info(`${plugin}: cached`);
              } else {
                buildPlugins.push(plugin);
                core.info(`${plugin}: needs build`);
              }
            }

            core.setOutput('build_plugins', JSON.stringify(buildPlugins));
            core.setOutput('cached_plugins', JSON.stringify(cachedPlugins));
            core.setOutput('has_build', String(buildPlugins.length > 0));

      - name: Fetch production version for PR preview
        if: github.event_name == 'pull_request'
        id: prod-version
        run: |
          PROD_VERSION=$(curl -sf \
            "https://pazer.build/sites/cc-marketplace/branch/master/wow-look-at-my-html-demo" \
            | jq -r '.["dist-tags"].latest // empty' 2>/dev/null || echo "")
          if [ -n "$PROD_VERSION" ]; then
            echo "version=$PROD_VERSION" >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    if: needs.prepare.outputs.has_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.prepare.outputs.build_plugins) }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute plugin hash
        id: hash
        run: echo "value=${{ hashFiles(format('plugins/{0}/**', matrix.plugin), 'tools/marketplace-build/**/*.go', 'tools/marketplace-build/go.mod') }}" >> $GITHUB_OUTPUT

      - uses: ./.github/actions/setup-marketplace-build

      - name: Build Go plugin
        if: ${{ hashFiles(format('plugins/{0}/**/*.go', matrix.plugin)) != '' }}
        uses: wow-look-at-my/go-toolchain@latest
        with:
          working-directory: plugins/${{ matrix.plugin }}
          os: linux,darwin
          arch: amd64,arm64
          upload-artifacts: 'false'

      - name: Build
        run: npx tsx .github/scripts/build-plugin.ts ${{ matrix.plugin }}

      - name: Test
        run: npx tsx .github/scripts/test-plugin.ts ${{ matrix.plugin }}

      - name: Cook plugin
        id: release
        run: marketplace-build release-plugin ${{ matrix.plugin }} >> $GITHUB_OUTPUT

      - name: Align plugin version to production
        if: needs.prepare.outputs.prod_version != ''
        run: |
          jq --arg v "${{ needs.prepare.outputs.prod_version }}" '.version = $v' \
            "${{ steps.release.outputs.source_dir }}/package.json" > /tmp/pkg-aligned.json && \
          mv /tmp/pkg-aligned.json "${{ steps.release.outputs.source_dir }}/package.json"

      - uses: ./.github/actions/setup-claude-code

      - name: Validate Plugin
        run: claude plugin validate ${{ steps.release.outputs.source_dir }}

      - name: Package plugin
        run: marketplace-build package-plugin --input ${{ steps.release.outputs.source_dir }} --output /tmp/packaged-${{ matrix.plugin }}

      - name: Save plugin cache
        uses: actions/cache/save@v4
        with:
          path: /tmp/packaged-${{ matrix.plugin }}
          key: plugin-${{ matrix.plugin }}-${{ steps.hash.outputs.value }}

      - name: Upload packaged plugin
        uses: actions/upload-artifact@v4
        with:
          name: packaged-${{ matrix.plugin }}
          path: /tmp/packaged-${{ matrix.plugin }}
          compression-level: 0
          if-no-files-found: error
          retention-days: 1

  registry:
    needs: [prepare, build]
    if: '!cancelled() && !failure()'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-marketplace-build

      - name: Restore cached plugins
        if: needs.prepare.outputs.cached_plugins != '[]' && needs.prepare.outputs.cached_plugins != ''
        uses: wow-look-at-my/actions@typescript#latest
        env:
          NODE_PATH: ${{ github.workspace }}/node_modules
        with:
          needs: ${{ toJSON(needs) }}
          script: |
            const { hashFiles } = require('@actions/glob');
            const { restoreCache } = require('@actions/cache');
            const plugins: string[] = JSON.parse(needs.prepare.outputs.cached_plugins);

            fs.mkdirSync('packaged', { recursive: true });
            const toolHash = await hashFiles('tools/marketplace-build/**/*.go', 'tools/marketplace-build/go.mod');

            for (const plugin of plugins) {
              const hash = await hashFiles(`plugins/${plugin}/**`);
              const key = `plugin-${plugin}-${hash}-${toolHash}`;
              const cachePath = `/tmp/packaged-${plugin}`;

              core.info(`Restoring ${plugin}`);
              const hit = await restoreCache([cachePath], key);
              if (!hit) throw new Error(`Cache miss for ${plugin} (${key})`);

              fs.renameSync(cachePath, `packaged/${plugin}`);
              core.info(`  OK`);
            }

      - name: Download built plugins
        if: needs.prepare.outputs.has_build == 'true'
        uses: actions/download-artifact@v4
        with:
          path: packaged
          pattern: packaged-*

      - name: Strip packaged- artifact prefix
        if: needs.prepare.outputs.has_build == 'true'
        run: |
          set -e
          shopt -s nullglob
          for d in packaged/packaged-*; do
            mv "$d" "packaged/${d#packaged/packaged-}"
          done

      - name: Compute registry base URLs
        id: base-url
        run: |
          SERVER="https://pazer.build"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH_URL="$SERVER/sites/cc-marketplace/branch/pr-${{ github.event.pull_request.number }}"
            echo "tarball-url=$BRANCH_URL" >> $GITHUB_OUTPUT
            echo "marketplace-url=$BRANCH_URL" >> $GITHUB_OUTPUT
          else
            ROOT_URL="$SERVER/sites/cc-marketplace/branch/master"
            echo "tarball-url=$ROOT_URL" >> $GITHUB_OUTPUT
            echo "marketplace-url=$ROOT_URL" >> $GITHUB_OUTPUT
          fi

      - name: Build npm registry
        id: registry
        run: marketplace-build build-npm-registry --input packaged --base-url "${{ steps.base-url.outputs.tarball-url }}" >> $GITHUB_OUTPUT

      - name: Add marketplace.json to registry
        run: |
          marketplace-build update-marketplace --input packaged --base-url "${{ steps.base-url.outputs.marketplace-url }}" > /tmp/marketplace-out.txt
          src=$(grep '^source_dir=' /tmp/marketplace-out.txt | cut -d= -f2)
          cp "$src/marketplace.json" "${{ steps.registry.outputs.registry_dir }}/marketplace.json"

      - name: Add site index to registry
        run: cp site/index.html "${{ steps.registry.outputs.registry_dir }}/index.html"

      - uses: ./.github/actions/setup-claude-code

      - name: Validate marketplace
        run: |
          claude plugin validate "${{ steps.registry.outputs.registry_dir }}/marketplace.json"
          claude plugin marketplace add "${{ steps.registry.outputs.registry_dir }}/marketplace.json"

      - name: Publish to buildhost
        id: publish
        uses: wow-look-at-my/actions@typescript#latest
        with:
          script: |
            await (async () => {
              const server = "https://pazer.build";
              const project = "cc-marketplace";
              const branch: string = "${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}";
              const registryDir: string = "${{ steps.registry.outputs.registry_dir }}";

              // Mint OIDC token for buildhost
              const idTokenUrl = env.ACTIONS_ID_TOKEN_REQUEST_URL;
              const idTokenBearer = env.ACTIONS_ID_TOKEN_REQUEST_TOKEN;
              if (!idTokenUrl || !idTokenBearer) {
                core.setFailed("OIDC not available. Add 'permissions: { id-token: write }'.");
                return;
              }
              const idResp = await fetch(`${idTokenUrl}&audience=${server}`, {
                headers: { Authorization: `Bearer ${idTokenBearer}` },
              });
              const token: string = ((await idResp.json()) as { value: string }).value;
              if (!token) { core.setFailed("Failed to obtain OIDC token"); return; }

              // Pack registry dir as zip and upload to buildhost
              const zipPath = path.join(os.tmpdir(), "npm-registry.zip");
              await exec.exec("bash", ["-c", `cd "${registryDir}" && zip -r "${zipPath}" .`]);
              const zipBody = fs.readFileSync(zipPath);

              let resp: Response | undefined;
              for (let attempt = 1; attempt <= 4; attempt++) {
                if (attempt > 1) {
                  const delay = 2 ** attempt * 1000; // 4s, 8s, 16s
                  core.info(`Retrying upload in ${delay / 1000}s (attempt ${attempt}/4)...`);
                  await new Promise(resolve => setTimeout(resolve, delay));
                }
                resp = await fetch(`${server}/sites/${project}/branch/${branch}`, {
                  method: "PUT",
                  headers: {
                    Authorization: `Bearer ${token}`,
                    "Content-Type": "application/zip",
                    "X-Git-Commit": github.sha,
                  },
                  body: zipBody,
                });
                if (resp.status < 500) break;
              }

              if (!resp || resp.status !== 201) {
                core.setFailed(`Upload failed (${resp?.status}): ${await resp?.text()}`);
                return;
              }

              const siteURL = `${server}/sites/${project}/branch/${branch}/`;
              core.info(`Published to ${siteURL}`);
              core.setOutput("site_url", siteURL);
            })();

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: wow-look-at-my/actions@typescript#latest
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          script: |
            const siteURL = "${{ steps.publish.outputs.site_url }}";
            const [owner, repo] = github.repository.split("/");
            await octokit(process.env.GH_TOKEN!).rest.issues.createComment({
              owner, repo,
              issue_number: github.event.pull_request.number,
              body: `📦 Preview npm registry: ${siteURL}\n\n\`\`\`\nclaude plugin marketplace add ${siteURL}marketplace.json\n\`\`\``,
            });
