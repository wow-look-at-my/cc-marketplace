name: Release Plugins

on:
  push:

concurrency:
  group: release-${{ github.ref }}

jobs:
  build-cli:
    uses: wow-look-at-my/go-toolchain/.github/workflows/build.yml@v1
    with:
      working-directory: tools/marketplace-build
      os: linux
      arch: amd64
      binary-artifact: marketplace-build
    secrets: inherit

  prepare:
    needs: build-cli
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      plugins: ${{ steps.matrix.outputs.plugins }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-marketplace-build

      - id: matrix
        run: marketplace-build prepare-matrix >> $GITHUB_OUTPUT

  build:
    needs: prepare
    if: needs.prepare.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.prepare.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-marketplace-build

      - uses: wow-look-at-my-code/actions@smart-cache#latest
        with:
          path: ~/go/pkg/mod ~/.cache/go-build
          key: go-${{ hashFiles('plugins/**/go.mod', 'plugins/**/go.sum') }}

      - name: Build
        run: marketplace-build build-plugin ${{ matrix.plugin }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Test
        run: marketplace-build test-plugin ${{ matrix.plugin }}

      - name: Prepare Release
        id: release
        run: marketplace-build release-plugin ${{ matrix.plugin }} >> $GITHUB_OUTPUT

      - uses: ./.github/actions/setup-claude-code

      - name: Validate Plugin
        run: claude plugin validate ${{ steps.release.outputs.source_dir }}

      - uses: wow-look-at-my-code/actions@orphan-release#latest
        with:
          source: ${{ steps.release.outputs.source_dir }}
          name: plugin/${{ matrix.plugin }}
          message: ${{ steps.release.outputs.message }}

  update:
    needs: [prepare, build]
    if: github.ref == 'refs/heads/master' && !cancelled() && !failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pages: write
      id-token: write
    environment: github-pages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-marketplace-build

      - name: Prepare Marketplace Update
        id: marketplace
        env:
          MARKETPLACE_URL: https://wow-look-at-my.github.io/cc-marketplace/marketplace.json
        run: marketplace-build update-marketplace >> $GITHUB_OUTPUT

      - uses: ./.github/actions/setup-claude-code

      - name: Validate Marketplace
        run: claude plugin validate ${{ steps.marketplace.outputs.source_dir }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.marketplace.outputs.source_dir }}

      - uses: actions/deploy-pages@v4

      - name: Verify marketplace install
        run: |
          claude plugin marketplace add https://wow-look-at-my.github.io/cc-marketplace/marketplace.json
          claude plugin marketplace list
