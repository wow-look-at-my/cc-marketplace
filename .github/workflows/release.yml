name: Release Plugins

on:
  push:
  delete:

concurrency:
  group: release-${{ github.ref }}

jobs:
  cleanup:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - run: git fetch --tags

      - uses: ./.github/actions/setup-marketplace-build

      - run: marketplace-build cleanup-branch ${{ github.event.ref }}

  prepare:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      plugins: ${{ steps.matrix.outputs.plugins }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch --tags

      - uses: ./.github/actions/setup-marketplace-build

      - id: matrix
        run: marketplace-build prepare-matrix >> $GITHUB_OUTPUT

  build:
    needs: prepare
    if: needs.prepare.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.prepare.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v4

      - run: git fetch --tags

      - uses: ./.github/actions/setup-marketplace-build

      - uses: extractions/setup-just@v2

      - uses: actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ hashFiles('plugins/**/go.mod', 'plugins/**/go.sum') }}

      - name: Snapshot cache
        run: marketplace-build cache-snapshot ~/go/pkg/mod ~/.cache/go-build

      - name: Build
        run: marketplace-build build-plugin ${{ matrix.plugin }}

      - name: Test
        run: marketplace-build test-plugin ${{ matrix.plugin }}

      - name: Release
        run: marketplace-build release-plugin ${{ matrix.plugin }}

      - name: Check cache changes
        id: cache-check
        if: always()
        run: |
          marketplace-build cache-changed ~/go/pkg/mod ~/.cache/go-build | tee /tmp/cache-changes.txt | head -100
          if [ -s /tmp/cache-changes.txt ]; then
            echo "Total: $(wc -l < /tmp/cache-changes.txt) files changed"
            echo "save=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/cache/save@v4
        if: steps.cache-check.outputs.save == 'true'
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ hashFiles('plugins/**/go.mod', 'plugins/**/go.sum') }}

  update:
    needs: [prepare, build]
    if: ${{ !cancelled() && !failure() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-marketplace-build

      - run: marketplace-build update-marketplace
