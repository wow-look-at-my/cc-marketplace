name: PR Preview

on:
    pull_request:
        types: [opened, reopened, synchronize, closed]

jobs:
    prepare:
        if: github.event.action != 'closed'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: ./.github/actions/setup-marketplace-build

            - uses: actions/upload-artifact@v4
              with:
                  name: marketplace-build-cli
                  path: tools/marketplace-build/build/marketplace-build

    build:
        needs: prepare
        if: github.event.action != 'closed'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: ./.github/actions/setup-marketplace-build
              with:
                  artifact-name: marketplace-build-cli

            - name: Build npm registry
              id: registry
              run: marketplace-build build-npm-registry >> $GITHUB_OUTPUT

            - name: Add marketplace.json to registry
              run: |
                  marketplace-build update-marketplace > /tmp/marketplace-out.txt
                  src=$(grep '^source_dir=' /tmp/marketplace-out.txt | cut -d= -f2)
                  cp "$src/marketplace.json" "${{ steps.registry.outputs.registry_dir }}/marketplace.json"

            - uses: actions/upload-artifact@v4
              with:
                  name: npm-registry
                  path: ${{ steps.registry.outputs.registry_dir }}

    deploy-preview:
        needs: build
        if: always()
        permissions:
            contents: write
            pull-requests: write
            pages: write
            id-token: write
            statuses: write
        uses: PazerOP/pr-preview-action/.github/workflows/preview.yml@4f248afac2702fab9d8bbffff53335b120dbf463
        with:
            artifact-name: npm-registry
        secrets: inherit
