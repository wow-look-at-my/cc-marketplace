name: Setup marketplace-build
description: Download pre-built marketplace-build CLI from artifact

runs:
  using: composite
  steps:
    - name: Fetch tags
      shell: bash
      run: git fetch --tags --force

    - uses: extractions/setup-just@v2

    - uses: actions/download-artifact@v4
      with:
        name: marketplace-build
        path: /usr/local/bin

    - shell: bash
      run: |
        mv /usr/local/bin/marketplace-build_linux_amd64 /usr/local/bin/marketplace-build
        chmod +x /usr/local/bin/marketplace-build
