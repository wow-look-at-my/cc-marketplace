name: Setup marketplace-build
description: Build or restore cached marketplace-build CLI

runs:
  using: composite
  steps:
    - name: Fetch tags
      shell: bash
      run: git fetch --tags --force

    - uses: extractions/setup-just@v2

    - name: Configure git for private repos
      shell: bash
      run: git config --global url."https://${PRIVATE_ORG_REPO_READ}@github.com/wow-look-at-my/".insteadOf "https://github.com/wow-look-at-my/"

    - name: Configure netrc for Go proxy
      shell: bash
      run: |
        cat >> ~/.netrc <<EOF
        machine goproxy.pazer.io login ${GOPROXY_USER} password ${GOPROXY_PASSWORD}
        EOF
        chmod 600 ~/.netrc

    - uses: wow-look-at-my/actions@download-release-binary#latest
      with:
        repo: wow-look-at-my/go-toolchain
        name: go-toolchain
        token: ${{ github.token }}

    - name: Build marketplace-build
      shell: bash
      run: |
        cd tools/marketplace-build
        go-toolchain

    - run: cp "tools/marketplace-build/build/marketplace-build" "/usr/local/bin/marketplace-build"
      shell: bash
