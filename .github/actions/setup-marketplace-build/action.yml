name: Setup marketplace-build
description: Build or restore cached marketplace-build CLI

runs:
  using: composite
  steps:
    - name: Get cache key
      id: cache-key
      shell: bash
      run: echo "key=marketplace-build-${{ hashFiles('tools/marketplace-build/**/*.go', 'tools/marketplace-build/go.mod', 'tools/marketplace-build/go.sum') }}" >> $GITHUB_OUTPUT

    - name: Restore cached binary
      id: cache
      uses: actions/cache@v4
      with:
        path: /usr/local/bin/marketplace-build
        key: ${{ steps.cache-key.outputs.key }}

    - name: Setup Go
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'
        cache-dependency-path: tools/marketplace-build/go.sum

    - name: Build CLI
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: cd tools/marketplace-build && go build -o /usr/local/bin/marketplace-build .
