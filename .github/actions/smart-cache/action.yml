name: Smart Cache
description: Cache with change detection - only saves when files actually changed

inputs:
  path:
    description: 'Paths to cache (space-separated)'
    required: true
  key:
    description: 'Cache key'
    required: true

outputs:
  cache-hit:
    description: 'Whether cache was restored'

runs:
  using: node20
  main: dist/main.js
  post: dist/post.js
  post-if: always()
